[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "grok-agent"
version = "1.0.0"
description = "🚀 Much better autonomous coding agent powered by xAI Grok. Enhanced with Streamlit UI, memory, new tools, and more."

dependencies = [
  "xai-sdk",
  "python-dotenv",
  "requests",
  "streamlit",
  "chromadb",
  "pydantic",
  "rich",
  "gradio",
]

[project.scripts]
grok-agent = "agent:main"
grok-chat = "chat_ui:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --strict-markers"

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I", "UP", "B", "A", "C4", "PT", "SIM"]
ignore = ["SIM118"]

[tool.ruff.lint.pytest]
enable = true