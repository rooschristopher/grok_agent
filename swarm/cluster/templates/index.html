<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Cluster Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'pulse': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-gray-100 min-h-screen p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-6xl font-black bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent drop-shadow-2xl mb-4">
                Swarm Cluster
            </h1>
            <p class="text-xl text-gray-400">Real-time dashboard for nodes and tasks</p>
        </header>

        <div class="grid lg:grid-cols-2 gap-8">
            <!-- Nodes Section -->
            <section class="bg-gray-800/50 backdrop-blur-xl border border-gray-700 rounded-3xl p-8 shadow-2xl hover:shadow-3xl transition-all duration-300">
                <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">
                    <span>🖥️ Nodes</span>
                </h2>
                <div class="relative">
                    <div id="nodes-loading" class="htmx-indicator absolute inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center rounded-2xl z-10 hidden">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-400"></div>
                    </div>
                    <div class="overflow-x-auto rounded-2xl border border-gray-700">
                        <table class="w-full">
                            <thead class="bg-gray-900/50 sticky top-0">
                                <tr>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">ID</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">Status</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">CPU</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">Memory</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">Tasks</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">Last Seen</th>
                                </tr>
                            </thead>
                            <tbody 
                                id="nodes"
                                hx-get="/api/nodes"
                                hx-trigger="load, every 3s"
                                hx-swap="innerHTML"
                                hx-indicator="#nodes-loading"
                                class="divide-y divide-gray-700"
                            >
                                <tr>
                                    <td colspan="6" class="px-6 py-12 text-center">
                                        <div class="flex flex-col items-center space-y-2">
                                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-400 mx-auto"></div>
                                            <span class="text-gray-500 text-sm">Loading nodes...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Tasks Section -->
            <section class="bg-gray-800/50 backdrop-blur-xl border border-gray-700 rounded-3xl p-8 shadow-2xl hover:shadow-3xl transition-all duration-300">
                <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">
                    <span>📋 Tasks</span>
                </h2>
                <form 
                    hx-post="/api/tasks" 
                    hx-target="#tasks"
                    class="mb-8 p-6 bg-gray-900/50 border border-gray-700 rounded-2xl backdrop-blur-sm"
                >
                    <div class="flex flex-col md:flex-row gap-4">
                        <input 
                            type="text" 
                            name="description" 
                            placeholder="Enter task description (e.g., compute pi to 1000 digits)..."
                            class="flex-1 px-4 py-3 bg-gray-700/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                            required
                        >
                        <button 
                            type="submit"
                            class="px-8 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200 whitespace-nowrap"
                        >
                            Add Task
                        </button>
                    </div>
                </form>
                <div class="relative">
                    <div id="tasks-loading" class="htmx-indicator absolute inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center rounded-2xl z-10 hidden">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-400"></div>
                    </div>
                    <div class="overflow-x-auto rounded-2xl border border-gray-700">
                        <table class="w-full">
                            <thead class="bg-gray-900/50 sticky top-0">
                                <tr>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">ID</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">Node</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">Status</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">Progress</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-wider">Created</th>
                                </tr>
                            </thead>
                            <tbody 
                                id="tasks"
                                hx-get="/api/tasks"
                                hx-trigger="load"
                                hx-swap="innerHTML"
                                hx-indicator="#tasks-loading"
                                class="divide-y divide-gray-700"
                            >
                                <tr>
                                    <td colspan="5" class="px-6 py-12 text-center">
                                        <div class="flex flex-col items-center space-y-2">
                                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-400 mx-auto"></div>
                                            <span class="text-gray-500 text-sm">Loading tasks...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
