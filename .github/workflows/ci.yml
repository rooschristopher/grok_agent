name: CI

on:
  push:
    branches: [develop, master, feat/**]
  pull_request:
    branches: [develop]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: uv-org/setup-uv@v1
        with:
          enable-cache: true
      - run: uv sync --extra full
      - run: make lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: uv-org/setup-uv@v1
        with:
          enable-cache: true
      - run: uv sync --extra full
      - run: make test

  coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/develop')
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: uv-org/setup-uv@v1
        with:
          enable-cache: true
      - run: uv sync --extra full
      - run: make test
      - name: Update coverage badge
        run: make update-coverage-badge
      - name: Commit and push changes if any
        run: |
          git config user.name github-actions[bot]
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md coverage.svg || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(coverage): update badge [skip ci]"
            git push
          fi
